name: Daily AI News (Manual Only)

# ⚠️ DISABLED: This workflow is disabled to prevent double broadcasting.
# The APScheduler in bot.py (Railway) handles all news broadcasts now.
# Use "Run workflow" button on GitHub only if needed for manual testing.

on:
  # ❌ Disabled scheduled run — APScheduler in bot.py handles broadcasts
  # schedule:
  #   - cron: '0 7 * * *'

  # ✅ Manual trigger only (for testing)
  workflow_dispatch:

jobs:
  send-news:
    runs-on: ubuntu-latest

    env:
      BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
      CHAT_ID: ${{ secrets.CHAT_ID }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      HUGGINGFACE_API_KEY: ${{ secrets.HUGGINGFACE_API_KEY }}
      COHERE_API_KEY: ${{ secrets.COHERE_API_KEY }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify environment
        run: |
          echo "Checking required environment variables..."
          if [ -z "$BOT_TOKEN" ]; then echo "❌ BOT_TOKEN is missing!"; exit 1; fi
          if [ -z "$CHAT_ID" ]; then echo "❌ CHAT_ID is missing!"; exit 1; fi
          if [ -z "$DATABASE_URL" ]; then echo "⚠️ DATABASE_URL is missing - data may not persist"; fi
          if [ -z "$GROQ_API_KEY" ]; then echo "⚠️ GROQ_API_KEY is missing"; fi
          echo "✅ Environment check passed"

      - name: Run AI News Bot
        run: python main.py

      - name: Notify on failure
        if: failure()
        run: |
          ERROR_MSG="⚠️ حدث خطأ في تشغيل بوت أخبار AI الشائع اليومي. تحقق من GitHub Actions للحصول على التفاصيل."
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.CHAT_ID }}" \
            -d text="$ERROR_MSG" \
            -d parse_mode="HTML"
